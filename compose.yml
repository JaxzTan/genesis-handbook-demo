services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    ports:
      - "3004:3004"
    develop:
      watch:
        # Sync source changes into the running container for hot reload
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        # Rebuild the image when dependencies change
        - action: rebuild
          path: ./frontend/package.json
